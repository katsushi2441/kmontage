<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kurage Montage</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Kurage Montage</p>
      <h1>参照動画から、日本語ショート考察動画へ。</h1>
      <p class="lead">X URLまたはYouTube URLを入力すると、動画の要点を解析し、Kurage Blog用のVTuberショート動画を生成します。</p>
    </section>

    <section class="panel composer">
      <label for="source-url">X URL / YouTube URL</label>
      <div class="input-row">
        <input id="source-url" type="url" placeholder="https://x.com/.../video/1 または https://www.youtube.com/watch?v=..." />
        <button id="generate">要約ショート生成</button>
      </div>
      <p id="message" class="message">待機中</p>
    </section>

    <section class="grid">
      <article class="panel result">
        <div class="section-title">
          <span>生成結果</span>
          <small id="status">未生成</small>
        </div>
        <h2 id="title">タイトルはここに表示されます</h2>
        <p id="summary" class="summary">動画解析後、要点と考察がここに表示されます。</p>
        <div class="actions">
          <button id="copy" disabled>コピー</button>
          <button id="post-x" disabled>X投稿</button>
          <button id="delete" class="danger" disabled>削除</button>
        </div>
        <h3>台本</h3>
        <ol id="script" class="script-list"></ol>
      </article>

      <article class="panel player-card">
        <div class="section-title">
          <span>動画プレビュー</span>
          <a id="kurage-link" href="#" target="_blank" rel="noopener">Kurageで開く</a>
        </div>
        <div id="player-wrap" class="player empty">
          <span>生成完了後に再生窓が表示されます</span>
        </div>
      </article>
    </section>

    <section class="panel history">
      <div class="section-title"><span>最近の生成</span><button id="reload">更新</button></div>
      <div id="history"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
